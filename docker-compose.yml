services:
  notebooklm-mcp:
    build: .
    container_name: notebooklm-mcp-server
    hostname: notebooklm-mcp-server

    # Security
    security_opt:
      - no-new-privileges:true

    # Volumes - mount Google auth cookies read-only + capture dumps writable
    volumes:
      - ~/.notebooklm:/auth:ro
      - ./dumps:/app/dumps

    # Environment
    environment:
      - PYTHONUNBUFFERED=1
      - HOST=0.0.0.0
      - PORT=10007
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AUTH_STORAGE_PATH=/auth/storage_state.json

    # Ports (localhost only)
    ports:
      - "127.0.0.1:10007:10007"

    # Restart policy
    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Networks
    networks:
      - notebooklm-mcp

networks:
  notebooklm-mcp:
    name: notebooklm-mcp
    driver: bridge
